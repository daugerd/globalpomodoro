<!doctype html>
<html lang="en">
  <head>
    <title>Global Pomodoro</title>
    <script>
      function addTimer(refreshInterval) {
        let timerTimeout;

        const mmss = new Date();
        document.getElementById("timer").innerHTML = `${mmss.getMinutes()}:${mmss.getSeconds()}`;
        
        if(mmss.getMinutes() < 25 ) {
          document.getElementById("indicator").innerHTML = "&#9205; ";
        } else if ((mmss.getMinutes() >= 30 && mmss.getMinutes() < 55)) {
          document.getElementById("indicator").innerHTML = "&#9205; ";
        } else {
          document.getElementById("indicator").innerHTML = "&#9208; ";
        }

        timerTimeout = setTimeout(function () {
          location.reload(true);
        }, refreshInterval);

        document.getElementById("controlButton").addEventListener("click", function () {
          if (document.getElementById("controlButton").innerHTML === "Play") {
            document.getElementById("controlButton").innerHTML = "Pause";
            timerTimeout = setTimeout(function () {
              location.reload(true);
            }, refreshInterval);
          } else {
            clearTimeout(timerTimeout);
            document.getElementById("controlButton").innerHTML = "Play";
          }
        });
      }
      </script>
  </head>
  <body onload="addTimer(1000)">
    <h1>Global Pomodoro</h1>
    <p><span id="indicator"></span><span id="timer"></span></p>
    <button id="controlButton">Pause</button>
    <p>Data Not Collected. The developer does not collect any data from this app.</p>
    <p>Support: <a href="mailto:gp@daugerd.com">gp@daugerd.com</a></p>
  </body>
</html>
