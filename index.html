<!doctype html>
<html lang="en">
  <head>
    <title>Global Pomodoro</title>
    <script>
      function addTimer(refreshInterval) {
        const mmss = new Date();
        document.getElementById("timer").innerHTML = `${mmss.getMinutes()}:${mmss.getSeconds()}`;

        if(mmss.getMinutes < 25 ) {
          document.getElementById("indicator").innerHTML = "&#9205; ";
        } if ((mmss.getMinutes >= 30 && mmss.getMinutes < 55)) {
          document.getElementById("indicator").innerHTML = "&#9205; ";
        } else {
          document.getElementById("indicator").innerHTML = "&#9208; ";
        }
        
        setTimeout(function() {
          location.reload(true);
        }, refreshInterval);
      }
    </script>
  </head>
  <body onload="addTimer(1000)">
    <h1>Global Pomodoro</h1>
    <p><span id="indicator"></span><span id="timer"></span></p>
  </body>
</html>
