<!doctype html>
<html lang="en">
  <head>
    <title>Global Pomodoro</title>
    <script>
      function addTimer(refreshInterval) {
        const mmss = new Date();
        document.getElementById("timer").innerHTML = `${mmss.getMinutes()}:${mmss.getSeconds()}`;
        
        setTimeout(function(refreshInterval) {
          location.reload(true);
        }, refreshInterval);
      }
    </script>
  </head>
  <body onload="addTimer(1000)">
    <h1>Global Pomodoro</h1>
    <p><span id="timer"></span></p>
  </body>
</html>
